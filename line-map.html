<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务器轨道交通一览</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 页面头部：主导航功能区，层级最高 -->
    <header class="site-header">
        <div class="header-container">
            <!-- 左侧-->
            <div class="logo-area">
                <!-- 首页图标 -->
                <a href="index.html" class="home-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </a>
            </div>

            <!-- 主导航菜单 -->
            <nav class="main-nav">
                <ul class="nav-list">
                    <li class="nav-item"><a href="news.html" class="nav-link">新闻中心</a></li>
                    <li class="nav-item"><a href="notices.html" class="nav-link">信息通告</a></li>
                    <li class="nav-item"><a href="line-map.html" class="nav-link">线网示意</a></li>
                    <li class="nav-item"><a href="https://mtr-query.mcbar.cc" target="_blank" class="nav-link">线路导航</a></li>
                    <li class="nav-item"><a href="planning.html" class="nav-link">建设规划</a></li>
                    <li class="nav-item"><a href="aboutcompany.html" class="nav-link">关于公司</a></li>
                    <!-- 预留扩展位：可添加二级下拉菜单、额外导航项 -->
                </ul>
            </nav>

            
            <div class="header-right">
                <!-- 语言切换 -->
                <a href="#" class="lang-link">EN</a>
            </div>
        </div>

    <!-- 下拉选项栏-->
    <div class="dropdown-bar">
        <div class="dropdown-container">
            <select class="map-select" id="mapSelect">
                <option value="全图" selected>全图 (Full Map)</option>
                <option value="鲤湖湾州及鲤城">鲤湖湾州及鲤城 (Leewoowae & Li City)</option>
                <option value="大都会区">大都会区 (Greater Politan Zone)</option>
                <option value="第三城">第三城 (City Three)</option>
                <option value="铜钿城">铜钿城 (Doondee City)</option>
                <option value="铁路">铁路 (Railway Only)</option>
            </select>
            <button class="info-btn" id="infoBtn" title="Information">i</button>
        </div>
    </div>
    </header>

    <!-- 图片展示区域：核心交互区-->
    <div class="map-container" id="mapContainer">
        <img src="images/全图.png" alt="服务器轨道交通线网图" class="subway-map" id="subwayMap">
        <div class="control-buttons">
            <button class="control-btn" id="zoomIn">+</button>
            <button class="control-btn" id="zoomOut">-</button>
            <button class="control-btn" id="reset">⟳</button>
        </div>
    </div>

    <!-- 信息弹窗 -->
    <div class="info-modal" id="infoModal">
        <div class="modal-content">
            <button class="close-btn" id="closeBtn">&times;</button>
            <h2 id="modal-title">线路说明</h2>
            <div class="modal-body" id="info-text">
                <!-- Content injected via JS -->
            </div>
            <div class="modal-footer">
                <p data-i18n="contact">维护者: <a href="https://github.com/LIYV6" target="_blank">LIYV6</a> + <a href="https://github.com/frankniubi" target="_blank">Frank Lau</a></p>
                <p style="margin-top: 0.5rem; opacity: 0.8; font-size: 0.75rem;"></p>
            </div>
        </div>
    </div>

    <script src="js/line-map.js"></script>
</body>
</html>
